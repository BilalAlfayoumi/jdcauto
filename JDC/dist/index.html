<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site temporairement indisponible</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        max-width: 520px;
        text-align: center;
      }

      .icon {
        width: 72px;
        height: 72px;
        background: #1a1a1a;
        border: 2px solid #2a2a2a;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2rem;
        font-size: 2rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #fff;
        margin-bottom: 1rem;
      }

      p {
        font-size: 1rem;
        color: #888;
        line-height: 1.7;
        margin-bottom: 0.75rem;
      }

      .divider {
        border: none;
        border-top: 1px solid #222;
        margin: 2rem 0;
      }

      .contact {
        font-size: 0.875rem;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">🔒</div>
      <h1>Site temporairement indisponible</h1>
      <p>Ce site est actuellement suspendu pour des raisons de maintenance.</p>
      <p>Nous nous excusons pour la gêne occasionnée.</p>
      <hr class="divider" />
      <p class="contact">Pour toute question, veuillez contacter l'administrateur du site.</p>
    </div>
  </body>
</html>
