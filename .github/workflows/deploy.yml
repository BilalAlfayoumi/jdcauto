name: Sync Spider-VO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Tous les jours à 6h UTC

jobs:
  spider-vo-sync:
    name: Sync Spider-VO
    runs-on: ubuntu-latest
    steps:
      - name: Lancer la synchronisation Spider-VO
        run: |
          http_code=$(curl -s -o /tmp/sync_body.txt -w "%{http_code}" \
            --max-time 120 \
            "https://www.jdcauto.fr/sync/spider_vo_sync.php?token=jdcauto_sync_2024_secret")
          echo "Code HTTP: $http_code"
          cat /tmp/sync_body.txt | sed 's/<[^>]*>//g' | grep -v "^[[:space:]]*$" || true
          if [ "$http_code" != "200" ]; then
            echo "Echec: code HTTP $http_code"
            exit 1
          fi
