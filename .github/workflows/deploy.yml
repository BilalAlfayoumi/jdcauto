name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # Tous les jours à 6h UTC (même heure que le cron Gandi)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: JDC/package-lock.json

      - name: Install dependencies
        run: |
          cd JDC
          npm ci

      - name: Build
        run: |
          cd JDC
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: JDC/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  spider-vo-sync:
    name: Sync Spider-VO
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Lancer la synchronisation Spider-VO
        run: |
          response=$(curl -s -w "\n%{http_code}" --max-time 120 \
            "https://www.jdcauto.fr/sync/spider_vo_sync.php?token=${{ secrets.SYNC_TOKEN }}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)
          echo "Code HTTP: $http_code"
          echo "$body" | sed 's/<[^>]*>//g' | grep -v "^$" || true
          if [ "$http_code" != "200" ]; then
            echo "Erreur: code HTTP $http_code"
            exit 1
          fi
