<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site en maintenance — JDC Auto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      text-align: center;
      max-width: 480px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #e5b84c;
      margin-bottom: 2.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #fff;
    }
    p {
      color: #aaa;
      line-height: 1.7;
      font-size: 1rem;
    }
    .divider {
      width: 40px;
      height: 3px;
      background: #e5b84c;
      margin: 1.5rem auto;
      border-radius: 2px;
    }
    .contact {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">JDC AUTO</div>
    <h1>Site temporairement indisponible</h1>
    <div class="divider"></div>
    <p>Ce site est actuellement en maintenance.<br>Nous reviendrons très bientôt.</p>
    <div class="contact">
      Pour toute question, contactez-nous :<br>
      <strong>jdcauto.fr</strong> | contact@jdcauto.fr
    </div>
  </div>
</body>
</html>
